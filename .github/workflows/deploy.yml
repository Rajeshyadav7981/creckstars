name: Deploy

# Auto-deploy to the VM after CI passes on main.
# SSHes in and runs scripts/deploy.sh, which backs up -> pulls -> migrates ->
# restarts -> health-gates -> auto-rolls-back on failure.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}   # manual "Run workflow" button

concurrency:
  group: deploy-production   # never two deploys at once
  cancel-in-progress: false

jobs:
  deploy:
    # only deploy if CI succeeded (or when triggered manually)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}          # crixone.in
          username: ${{ secrets.VM_USER }}      # ry128037
          key: ${{ secrets.VM_SSH_KEY }}        # private key; pubkey in VM authorized_keys
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          script_stop: true
          command_timeout: 10m
          script: |
            cd ~/creckstars
            bash scripts/deploy.sh

      - name: Verify public health endpoint
        run: |
          for i in $(seq 1 10); do
            if curl -fsS https://crixone.in/health; then echo " OK"; exit 0; fi
            sleep 3
          done
          echo "public health check failed"; exit 1
